name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        if: always()
        run: |
          mkdir -p playwright-report
          PLAYWRIGHT_JSON_OUTPUT_NAME=playwright-report/report.json npx playwright test --reporter=line,json | tee playwright-report/output.log

      - name: Write test summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const outputLogPath = 'playwright-report/output.log';
          const reportJsonPath = 'playwright-report/report.json';

          const markdown = [];
          markdown.push('## CI Test Summary');

          let total = 0;
          let passed = 0;
          let failed = 0;
          let skipped = 0;

          if (fs.existsSync(reportJsonPath)) {
            const report = JSON.parse(fs.readFileSync(reportJsonPath, 'utf8'));
            const walkSuite = (suite) => {
              if (Array.isArray(suite.specs)) {
                for (const spec of suite.specs) {
                  if (Array.isArray(spec.tests)) {
                    for (const test of spec.tests) {
                      const results = Array.isArray(test.results) ? test.results : [];
                      const finalResult = results[results.length - 1];
                      const status = (finalResult && finalResult.status) || test.status || 'unknown';
                      total += 1;
                      if (status === 'passed') passed += 1;
                      else if (status === 'skipped') skipped += 1;
                      else failed += 1;
                    }
                  }
                }
              }
              if (Array.isArray(suite.suites)) {
                for (const child of suite.suites) walkSuite(child);
              }
            };

            for (const suite of report.suites || []) walkSuite(suite);
          }

          markdown.push('| ✅ Passed | ❌ Failed | ⏭️ Skipped | Total |');
          markdown.push('|---:|---:|---:|---:|');
          markdown.push(`| ${passed} | ${failed} | ${skipped} | ${total} |`);
          markdown.push('');

          const summaries = [];
          if (fs.existsSync(outputLogPath)) {
            const lines = fs.readFileSync(outputLogPath, 'utf8').split(/\r?\n/);
            const ansiRegex = /\u001b\[[0-9;]*m/g;
            for (const line of lines) {
              const cleanLine = line.replace(ansiRegex, '');
              const markerIndex = cleanLine.indexOf('TEST_SUMMARY:');
              if (markerIndex !== -1) {
                try {
                  const payload = cleanLine.slice(markerIndex + 'TEST_SUMMARY:'.length).trim();
                  summaries.push(JSON.parse(payload));
                } catch (_error) {}
              }
            }
          }

          markdown.push('### Individual Test Details');
          if (summaries.length === 0) {
            markdown.push('- No `TEST_SUMMARY` entries were found in test output.');
          } else {
            for (const summary of summaries) {
              markdown.push(`#### ${summary.test || '(unknown test)'}`);
              markdown.push('| Field | Value |');
              markdown.push('|---|---|');
              for (const [key, value] of Object.entries(summary)) {
                if (key === 'test') continue;
                const label = key
                  .replace(/([a-z])([A-Z])/g, '$1 $2')
                  .replace(/^./, character => character.toUpperCase());
                markdown.push(`| ${label} | ${String(value)} |`);
              }
              markdown.push('');
            }
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${markdown.join('\n')}\n`);
          NODE

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
