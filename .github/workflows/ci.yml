name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: |
          mkdir -p playwright-report
          npx playwright test | tee playwright-report/output.log

      - name: Write test summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'playwright-report/output.log';

          if (!fs.existsSync(path)) {
            console.log('No output.log found');
            process.exit(0);
          }

          const lines = fs.readFileSync(path, 'utf8').split(/\r?\n/);
          const summaries = [];

          for (const line of lines) {
            if (line.startsWith('TEST_SUMMARY:')) {
              try {
                summaries.push(JSON.parse(line.replace('TEST_SUMMARY:', '')));
              } catch (_error) {}
            }
          }

          const out = [];
          out.push('### Test Summary');

          if (summaries.length === 0) {
            out.push('- No TEST_SUMMARY entries found in output');
          } else {
            for (const summary of summaries) {
              out.push(`- ${summary.test || '(unknown test)'}`);

              for (const [key, value] of Object.entries(summary)) {
                if (key === 'test') continue;
                const label = key
                  .replace(/([a-z])([A-Z])/g, '$1 $2')
                  .replace(/^./, character => character.toUpperCase());
                out.push(`  - ${label}: ${value}`);
              }
            }
          }

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${out.join('\n')}\n`);
          NODE

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
